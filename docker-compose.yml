services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maspotify
      POSTGRES_PASSWORD: maspotify
      POSTGRES_DB: maspotify
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maspotify"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://maspotify:maspotify@db:5432/maspotify
    ports:
      - "8888:8888"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
