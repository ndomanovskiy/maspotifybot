name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install .[dev]
      - name: Run tests
        env:
          TELEGRAM_BOT_TOKEN: "0000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAaaa"
          TELEGRAM_ADMIN_ID: "0"
          SPOTIFY_CLIENT_ID: "test"
          SPOTIFY_CLIENT_SECRET: "test"
        run: pytest tests/ -v
      - name: Notify tests failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.ADMIN_ID }}" \
            --data-urlencode "text=❌ CI: тесты упали — деплой отменён"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/maspotifybot
            git pull origin main
            docker compose up -d --build --remove-orphans

      - name: Notify deploy failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.ADMIN_ID }}" \
            --data-urlencode "text=❌ Деплой упал — проверь сервер"
